<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ĐẾM NGƯỢC | Đồng Hồ Cao Cấp</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-dark: #020308;
  --card-bg: rgba(8, 12, 22, 0.75);
  --border-glow: rgba(0, 255, 170, 0.3);
  --green-primary: #00ffaa;
  --green-primary-dark: #00cc88;
  --purple-grad: #a855f7;
  --pink-accent: #f472b6;
  --text-white: #ffffff;
  --text-silver: #cdd9ff;
  --text-muted: #6c7a9e;
}

body {
  background: var(--bg-dark);
  font-family: 'Inter', 'Space Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
}

/* 背景粒子 Canvas */
#particle-canvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0.5;
  pointer-events: none;
}

/* 科技网格 */
.grid-overlay {
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0, 255, 170, 0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 170, 0.07) 1px, transparent 1px);
  background-size: 45px 45px;
  pointer-events: none;
  z-index: 1;
  opacity: 0.6;
}

/* 光晕球体 */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(130px);
  z-index: 0;
  pointer-events: none;
  opacity: 0.25;
  animation: floatOrb 16s infinite alternate ease-in-out;
}
.orb-1 { width: 65vmin; height: 65vmin; background: var(--purple-grad); top: -12%; right: -8%; }
.orb-2 { width: 75vmin; height: 75vmin; background: var(--green-primary); bottom: -18%; left: -12%; opacity: 0.2; animation-duration: 20s; }
.orb-3 { width: 45vmin; height: 45vmin; background: var(--pink-accent); top: 45%; left: 20%; opacity: 0.18; filter: blur(100px); animation-duration: 13s; }

@keyframes floatOrb {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(4%, 5%) scale(1.1); }
}

/* 主容器 */
.app-container {
  position: relative;
  z-index: 20;
  width: 100%;
  max-width: 640px;
  margin: 1rem;
  padding: 0.5rem;
}

/* ========= 头部 - 字体超级漂亮 ========= */
.header-area {
  text-align: center;
  margin-bottom: 2rem;
}
.badge-timer {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(0, 255, 170, 0.08);
  border: 1px solid rgba(0, 255, 170, 0.35);
  border-radius: 60px;
  padding: 0.5rem 1.8rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--green-primary);
  text-transform: uppercase;
  margin-bottom: 1.2rem;
  backdrop-filter: blur(8px);
}
.badge-timer::before {
  content: '';
  width: 8px;
  height: 8px;
  background: var(--green-primary);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--green-primary);
  animation: pulseDot 1.5s infinite;
}
@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.6); }
}

/* Chữ ĐẾM NGƯỢC siêu đẹp - chuẩn nét */
.main-title {
  font-family: 'Inter', 'Space Grotesk', sans-serif;
  font-weight: 800;
  font-size: clamp(3.2rem, 13vw, 7rem);
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin-top: 0.2rem;
}
.title-line1 {
  display: block;
  background: linear-gradient(115deg, #FFFFFF 0%, #C0E0FF 45%, #FFFFFF 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 2px 12px rgba(0,255,170,0.15);
}
.title-line2 {
  display: block;
  background: linear-gradient(125deg, #00ffaa, #b87eff, #f472b6);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(0,255,170,0.3));
  letter-spacing: -0.01em;
}

/* Glass card chính */
.glass-card {
  background: rgba(6, 10, 20, 0.75);
  backdrop-filter: blur(20px);
  border-radius: 2rem;
  border: 1px solid rgba(0, 255, 170, 0.25);
  box-shadow: 0 25px 40px -16px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  padding: 1.8rem 1.6rem;
  transition: all 0.2s;
}

/* Tabs */
.tab-bar {
  display: flex;
  gap: 0.6rem;
  background: rgba(0, 0, 0, 0.5);
  padding: 0.4rem;
  border-radius: 3rem;
  margin-bottom: 2rem;
  border: 1px solid rgba(255,255,255,0.06);
}
.tab {
  flex: 1;
  background: transparent;
  border: none;
  padding: 0.7rem 0.5rem;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.88rem;
  border-radius: 2.5rem;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: linear-gradient(105deg, rgba(0, 255, 170, 0.18), rgba(168, 85, 247, 0.12));
  color: white;
  box-shadow: 0 0 12px rgba(0, 255, 170, 0.2);
  border: 1px solid rgba(0, 255, 170, 0.5);
}

/* input style */
.field-group label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--green-primary);
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.5rem;
}
.modern-input {
  width: 100%;
  background: rgba(1, 3, 12, 0.9);
  border: 1.5px solid rgba(0, 255, 170, 0.3);
  border-radius: 1.6rem;
  padding: 0.9rem 1.2rem;
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.2rem;
  font-weight: 500;
  text-align: center;
  outline: none;
  transition: all 0.2s;
}
.modern-input:focus {
  border-color: var(--green-primary);
  box-shadow: 0 0 0 3px rgba(0, 255, 170, 0.2);
  background: #050a15;
}
.time-row {
  display: flex;
  gap: 1rem;
  align-items: flex-end;
}
.arrow-symbol {
  font-size: 2rem;
  font-weight: 600;
  color: var(--green-primary);
  margin-bottom: 0.5rem;
  text-shadow: 0 0 5px #00ffaa80;
}
.hint-sm {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 0.6rem;
  font-family: monospace;
}
.error-msg {
  min-height: 2.5rem;
  color: #ff6b8b;
  font-size: 0.75rem;
  text-align: center;
  font-family: monospace;
}
.btn-primary {
  background: linear-gradient(98deg, #00ffaa, #00cc99);
  width: 100%;
  border: none;
  border-radius: 3rem;
  padding: 1rem;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: #03060c;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 18px rgba(0, 255, 170, 0.25);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0, 255, 170, 0.45);
}

/* Timer panel */
.timer-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
}
.timer-label-tag {
  background: rgba(0,255,170,0.1);
  border-radius: 3rem;
  padding: 0.35rem 1.5rem;
  font-family: monospace;
  font-size: 0.75rem;
  color: #b3ffe6;
}
.ring-wrapper {
  position: relative;
  width: 260px;
  height: 260px;
}
.ring-svg {
  position: absolute;
  top: 0;
  left: 0;
  transform: rotate(-90deg);
}
.ring-bg-track {
  fill: none;
  stroke: #1e2a3a;
  stroke-width: 12;
}
.ring-glow-effect {
  fill: none;
  stroke: rgba(0,255,170,0.25);
  stroke-width: 20;
  stroke-linecap: round;
  filter: blur(3px);
}
.ring-active {
  fill: none;
  stroke: url(#gradRingColor);
  stroke-width: 13;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.center-ring {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.big-number {
  font-family: 'Inter', sans-serif;
  font-weight: 800;
  font-size: 4.8rem;
  background: linear-gradient(145deg, #ffffff, #b5ffe0);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0;
}
.unit-ring {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--green-primary);
}
.second-pill {
  background: #0a1020;
  padding: 0.5rem 1.4rem;
  border-radius: 3rem;
  font-family: monospace;
  border: 1px solid rgba(0,255,170,0.3);
}
.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.8rem;
  width: 100%;
}
.stat-item {
  background: rgba(0, 0, 0, 0.5);
  border-radius: 1.2rem;
  padding: 0.7rem 0.3rem;
  text-align: center;
  border: 1px solid rgba(0,255,170,0.2);
}
.stat-number {
  font-size: 1.25rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  color: white;
}
.stat-caption {
  font-size: 0.6rem;
  text-transform: uppercase;
  color: var(--green-primary);
}
.progress-area {
  width: 100%;
}
.progress-bg {
  background: #121a2a;
  height: 6px;
  border-radius: 10px;
  overflow: hidden;
}
.progress-active {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffaa, #bc7eff);
  border-radius: 10px;
  transition: width 0.35s ease;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  margin-top: 8px;
  color: var(--text-silver);
}
.endtime-block {
  font-family: monospace;
  background: #030812;
  padding: 0.5rem 1rem;
  border-radius: 2rem;
  font-size: 0.75rem;
}
.btn-outline {
  background: transparent;
  border: 1px solid rgba(0,255,170,0.6);
  border-radius: 3rem;
  padding: 0.7rem 2rem;
  font-family: monospace;
  font-weight: 500;
  color: var(--green-primary);
  cursor: pointer;
  transition: 0.2s;
}
.btn-outline:hover {
  background: rgba(0,255,170,0.12);
  box-shadow: 0 0 12px rgba(0,255,170,0.2);
}
.done-screen {
  text-align: center;
}
.done-icon-lg {
  font-size: 5rem;
  filter: drop-shadow(0 0 14px #00ffaa);
  margin-bottom: 0.6rem;
}
.done-heading {
  font-family: 'Inter', sans-serif;
  font-size: 3rem;
  font-weight: 800;
  background: linear-gradient(135deg, #00ffaa, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>
<div class="glow-orb orb-3"></div>

<div class="app-container">
  <div class="header-area">
    <div class="badge-timer">CHRONOS</div>
    <div class="main-title">
      <span class="title-line1">ĐẾM</span>
      <span class="title-line2">NGƯỢC</span>
    </div>
  </div>

  <!-- Panel cài đặt -->
  <div id="setupPanel" class="glass-card">
    <div class="tab-bar">
      <button class="tab active" id="minutesTabBtn">📌 SỐ PHÚT</button>
      <button class="tab" id="rangeTabBtn">⏲️ KHUNG GIỜ</button>
    </div>
    <div id="minutesModeDiv">
      <div class="field-group">
        <label>⏱️ NHẬP SỐ PHÚT</label>
        <input type="number" id="minutesInput" class="modern-input" placeholder="Ví dụ: 45" value="30">
      </div>
      <div class="hint-sm">🔹 Từ 1 đến 9999 phút</div>
    </div>
    <div id="rangeModeDiv" style="display: none;">
      <div class="time-row">
        <div class="field-group" style="flex:1">
          <label>BẮT ĐẦU</label>
          <input type="time" id="fromTime" class="modern-input" value="09:00">
        </div>
        <div class="arrow-symbol">→</div>
        <div class="field-group" style="flex:1">
          <label>KẾT THÚC</label>
          <input type="time" id="toTime" class="modern-input" value="10:25">
        </div>
      </div>
      <div class="hint-sm">✨ Tự động tính số phút chênh lệch</div>
    </div>
    <div class="error-msg" id="globalError"></div>
    <button class="btn-primary" id="startCountdownBtn">▶ BẮT ĐẦU</button>
  </div>

  <!-- Panel đếm ngược -->
  <div id="timerPanel" style="display: none;">
    <div class="glass-card timer-container">
      <div class="timer-label-tag" id="timerTagLabel">-- phút</div>
      <div class="ring-wrapper">
        <svg class="ring-svg" viewBox="0 0 280 280" width="260" height="260">
          <defs>
            <linearGradient id="gradRingColor" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00ffaa"/>
              <stop offset="100%" stop-color="#b87eff"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg-track" cx="140" cy="140" r="120"/>
          <circle class="ring-glow-effect" id="ringGlowLayer" cx="140" cy="140" r="120" stroke-dasharray="753.98" stroke-dashoffset="0"/>
          <circle class="ring-active" id="ringProgressMain" cx="140" cy="140" r="120" stroke-dasharray="753.98" stroke-dashoffset="0"/>
        </svg>
        <div class="center-ring">
          <div class="big-number" id="remainingMinutes">00</div>
          <div class="unit-ring">phút</div>
        </div>
      </div>
      <div class="second-pill">⏳ còn <strong id="remainingSecondsText">00</strong> giây</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-number" id="percentDone">0%</div><div class="stat-caption">đã qua</div></div>
        <div class="stat-item"><div class="stat-number" id="remainingFormatted">--</div><div class="stat-caption">còn lại</div></div>
        <div class="stat-item"><div class="stat-number" id="totalFormatted">--</div><div class="stat-caption">tổng</div></div>
      </div>
      <div class="progress-area">
        <div class="progress-bg"><div class="progress-active" id="progressFillActive"></div></div>
        <div class="progress-meta"><span id="progressLeftMeta">0%</span><span id="progressRightMeta">--</span></div>
      </div>
      <div class="endtime-block">🎯 Kết thúc lúc: <strong id="endTimeHumanRead">--:--:--</strong></div>
      <button class="btn-outline" id="resetTimerButton">↻ ĐẶT LẠI</button>
    </div>
  </div>

  <!-- Panel hoàn thành -->
  <div id="donePanel" style="display: none;">
    <div class="glass-card done-screen">
      <div class="done-icon-lg">🎉✨🎉</div>
      <div class="done-heading">HOÀN THÀNH</div>
      <p style="margin: 1rem 0; font-family: monospace; color: #b7c3e6;" id="completeMessage">Đếm ngược kết thúc xuất sắc</p>
      <button class="btn-primary" id="doneResetButton" style="max-width: 200px; margin: 0 auto;">LÀM LẠI</button>
    </div>
  </div>
</div>

<script>
  (function(){
    // ---------- Background CANVAS tiên tiến ----------
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particlesList = [];
    
    function resizeCanvas(){
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    class ParticleFlow{
      constructor(){
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.radius = Math.random() * 1.8 + 0.5;
        this.vx = (Math.random() - 0.5) * 0.2;
        this.vy = (Math.random() - 0.5) * 0.2;
        this.alpha = Math.random() * 0.55 + 0.1;
        this.colorGroup = Math.random() > 0.6 ? '0,255,170' : '139,92,246';
      }
      update(){
        this.x += this.vx;
        this.y += this.vy;
        if(this.x < -20) this.x = width + 20;
        if(this.x > width+20) this.x = -20;
        if(this.y < -20) this.y = height + 20;
        if(this.y > height+20) this.y = -20;
      }
      draw(){
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${this.colorGroup}, ${this.alpha})`;
        ctx.fill();
      }
    }
    for(let i=0;i<140;i++) particlesList.push(new ParticleFlow());
    
    function drawConnections(){
      for(let i=0;i<particlesList.length;i++){
        for(let j=i+1;j<particlesList.length;j++){
          const dx = particlesList[i].x - particlesList[j].x;
          const dy = particlesList[i].y - particlesList[j].y;
          const dist = Math.hypot(dx, dy);
          if(dist < 110){
            ctx.beginPath();
            ctx.moveTo(particlesList[i].x, particlesList[i].y);
            ctx.lineTo(particlesList[j].x, particlesList[j].y);
            ctx.strokeStyle = `rgba(0, 210, 160, ${0.05 * (1 - dist/110)})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
      }
    }
    
    function animateBackground(){
      ctx.clearRect(0, 0, width, height);
      for(let p of particlesList) { p.update(); p.draw(); }
      drawConnections();
      requestAnimationFrame(animateBackground);
    }
    animateBackground();
    
    // ---------- LOGIC ĐẾM NGƯỢC ----------
    let activeMode = 'minutes';
    let timerInterval = null;
    let targetEndTime = null;
    let totalDurationMs = null;
    const CIRCUM = 753.9822368615503;
    
    // DOM
    const setupDiv = document.getElementById('setupPanel');
    const timerDiv = document.getElementById('timerPanel');
    const doneDiv = document.getElementById('donePanel');
    const minutesModeDiv = document.getElementById('minutesModeDiv');
    const rangeModeDiv = document.getElementById('rangeModeDiv');
    const minutesInput = document.getElementById('minutesInput');
    const fromTime = document.getElementById('fromTime');
    const toTime = document.getElementById('toTime');
    const errorSpan = document.getElementById('globalError');
    const startBtn = document.getElementById('startCountdownBtn');
    const minutesTab = document.getElementById('minutesTabBtn');
    const rangeTab = document.getElementById('rangeTabBtn');
    const resetTimer = document.getElementById('resetTimerButton');
    const resetDone = document.getElementById('doneResetButton');
    
    // Timer display elements
    const timerTag = document.getElementById('timerTagLabel');
    const remainingMinsSpan = document.getElementById('remainingMinutes');
    const remainingSecsSpan = document.getElementById('remainingSecondsText');
    const percentDoneSpan = document.getElementById('percentDone');
    const remainingFormattedSpan = document.getElementById('remainingFormatted');
    const totalFormattedSpan = document.getElementById('totalFormatted');
    const progressFill = document.getElementById('progressFillActive');
    const progressLeftMeta = document.getElementById('progressLeftMeta');
    const progressRightMeta = document.getElementById('progressRightMeta');
    const endTimeHumanSpan = document.getElementById('endTimeHumanRead');
    const ringProgress = document.getElementById('ringProgressMain');
    const ringGlowLayer = document.getElementById('ringGlowLayer');
    const completeMsgSpan = document.getElementById('completeMessage');
    
    function formatTimeSmart(ms){
      let secTot = Math.floor(ms/1000);
      let mins = Math.floor(secTot/60);
      let hours = Math.floor(mins/60);
      if(hours>0) return `${hours}g ${mins%60}p`;
      return `${mins}p ${secTot%60}s`;
    }
    
    function stopCountdown(){
      if(timerInterval){
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    
    function resetToSetup(){
      stopCountdown();
      targetEndTime = null;
      totalDurationMs = null;
      setupDiv.style.display = 'block';
      timerDiv.style.display = 'none';
      doneDiv.style.display = 'none';
      errorSpan.innerText = '';
    }
    
    function updateTimerDisplay(remainingMs){
      if(!totalDurationMs || remainingMs <= 0) return true;
      const elapsed = totalDurationMs - remainingMs;
      let percent = Math.min(1, Math.max(0, elapsed / totalDurationMs));
      let percentInt = Math.floor(percent * 100);
      percentDoneSpan.innerText = `${percentInt}%`;
      remainingFormattedSpan.innerText = formatTimeSmart(remainingMs);
      const secLeft = Math.ceil(remainingMs/1000);
      const minsLeft = Math.floor(secLeft / 60);
      const secs = secLeft % 60;
      remainingMinsSpan.innerText = minsLeft.toString().padStart(2,'0');
      remainingSecsSpan.innerText = secs.toString().padStart(2,'0');
      progressFill.style.width = `${percentInt}%`;
      progressLeftMeta.innerText = `${percentInt}% đã qua`;
      progressRightMeta.innerText = `${secLeft} giây còn lại`;
      const offset = CIRCUM * percent;
      ringProgress.style.strokeDashoffset = offset;
      ringGlowLayer.style.strokeDashoffset = offset;
      return false;
    }
    
    function startTicking(){
      if(!targetEndTime || !totalDurationMs) return;
      function tick(){
        const now = Date.now();
        let remaining = targetEndTime - now;
        if(remaining <= 0){
          stopCountdown();
          const totalMins = Math.round(totalDurationMs / 60000);
          completeMsgSpan.innerText = `✅ Hoàn thành ${totalMins} phút đếm ngược.`;
          timerDiv.style.display = 'none';
          doneDiv.style.display = 'flex';
          return;
        }
        updateTimerDisplay(remaining);
      }
      tick();
      timerInterval = setInterval(tick, 360);
    }
    
    function startCountdown(totalMs, labelDesc, endDateObj){
      if(totalMs <= 0){
        errorSpan.innerText = 'Thời gian không hợp lệ';
        return false;
      }
      stopCountdown();
      totalDurationMs = totalMs;
      targetEndTime = Date.now() + totalMs;
      timerTag.innerText = labelDesc;
      totalFormattedSpan.innerText = formatTimeSmart(totalMs);
      endTimeHumanSpan.innerText = endDateObj.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      setupDiv.style.display = 'none';
      timerDiv.style.display = 'flex';
      doneDiv.style.display = 'none';
      startTicking();
      return true;
    }
    
    function onStart(){
      errorSpan.innerText = '';
      if(activeMode === 'minutes'){
        let minsVal = parseInt(minutesInput.value);
        if(isNaN(minsVal) || minsVal < 1){
          errorSpan.innerText = '⚠️ Nhập số phút hợp lệ (>=1)';
          return;
        }
        if(minsVal > 9999){
          errorSpan.innerText = '⚠️ Số phút tối đa 9999';
          return;
        }
        const duration = minsVal * 60000;
        const endDate = new Date(Date.now() + duration);
        startCountdown(duration, `${minsVal} phút`, endDate);
      } else {
        let fromVal = fromTime.value;
        let toVal = toTime.value;
        if(!fromVal || !toVal){
          errorSpan.innerText = 'Chọn đủ thời gian bắt đầu & kết thúc';
          return;
        }
        let [fh, fm] = fromVal.split(':').map(Number);
        let [th, tm] = toVal.split(':').map(Number);
        let fromMins = fh*60+fm;
        let toMins = th*60+tm;
        if(toMins <= fromMins) toMins += 1440;
        let diffMins = toMins - fromMins;
        if(diffMins <= 0 || diffMins > 2880){
          errorSpan.innerText = '⚠️ Khoảng thời gian không hợp lệ (tối đa 48h)';
          return;
        }
        const duration = diffMins * 60000;
        const endDate = new Date(Date.now() + duration);
        startCountdown(duration, `${fromVal} → ${toVal} (${diffMins} phút)`, endDate);
      }
    }
    
    function setUIMode(mode){
      activeMode = mode;
      if(mode === 'minutes'){
        minutesModeDiv.style.display = 'block';
        rangeModeDiv.style.display = 'none';
        minutesTab.classList.add('active');
        rangeTab.classList.remove('active');
      } else {
        minutesModeDiv.style.display = 'none';
        rangeModeDiv.style.display = 'block';
        rangeTab.classList.add('active');
        minutesTab.classList.remove('active');
      }
      errorSpan.innerText = '';
    }
    
    minutesTab.addEventListener('click', () => setUIMode('minutes'));
    rangeTab.addEventListener('click', () => setUIMode('range'));
    startBtn.addEventListener('click', onStart);
    resetTimer.addEventListener('click', resetToSetup);
    resetDone.addEventListener('click', resetToSetup);
    
    setUIMode('minutes');
    minutesInput.value = "35";
    fromTime.value = "13:30";
    toTime.value = "14:50";
  })();
</script>
</body>
