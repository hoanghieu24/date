<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — Đếm Ngược</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f5f5f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
@media(prefers-color-scheme:dark){
  body{background:#111113}
  .card{background:#1c1c1f;border-color:#2e2e32}
  .tabs{background:#111113;border-color:#2e2e32}
  .tab.active{background:#1c1c1f;color:#378add}
  .tab{color:#888}
  .field{background:#111113;border-color:#2e2e32;color:#f0f0f0}
  .hint{color:#555}
  .stat{background:#111113;border-color:#2e2e32}
  .stat-n{color:#f0f0f0}
  .stat-l{color:#555}
  .prog-bg{background:#2e2e32}
  .end-info{background:#111113;border-color:#2e2e32;color:#aaa}
  .btn-reset{border-color:#2e2e32;color:#aaa}
  .btn-reset:hover{background:#2e2e32;border-color:#378add;color:#378add}
  .timer-tag{background:#0c447c22;border-color:#185FA5;color:#378add}
  .badge{background:#0c447c22;border-color:#185FA5;color:#378add}
  .done-title,.main-title{color:#f0f0f0}
  .done-sub{color:#888}
  .lbl{color:#666}
  .ring-track{stroke:#2e2e32}
  #rMins{fill:#f0f0f0}
  #rUnit,#rSecs{fill:#aaa}
  .err{color:#f09595}
  .arrow-div{color:#555}
}
.wrap{display:flex;flex-direction:column;align-items:center;gap:0;width:100%;max-width:460px}
.badge{display:inline-flex;align-items:center;gap:6px;background:#e6f1fb;border:0.5px solid #85b7eb;border-radius:100px;padding:4px 14px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#185FA5;margin-bottom:1rem}
.badge-dot{width:6px;height:6px;background:#185FA5;border-radius:50%;animation:pdot 1.4s infinite}
@keyframes pdot{0%,100%{opacity:.3}50%{opacity:1}}
.main-title{font-size:clamp(2.2rem,9vw,3.2rem);font-weight:600;text-align:center;line-height:1;margin-bottom:1.5rem;color:#111113;letter-spacing:-.02em}
.main-title em{font-style:normal;color:#185FA5}
.card{background:#fff;border:0.5px solid #d3d1c7;border-radius:16px;width:100%;overflow:hidden}
.card-body{padding:1.5rem}
.tabs{display:flex;background:#f1efe8;border-radius:10px;overflow:hidden;margin-bottom:1.25rem;border:0.5px solid #d3d1c7}
.tab{flex:1;background:transparent;border:none;padding:9px 8px;font-size:12px;font-weight:500;color:#888780;cursor:pointer;transition:all .2s;letter-spacing:.05em;text-transform:uppercase;font-family:'Inter',sans-serif;border-bottom:2px solid transparent}
.tab.active{background:#fff;color:#185FA5;border-bottom:2px solid #185FA5}
.lbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:#888780;display:block;margin-bottom:5px}
.field{width:100%;background:#f1efe8;border:0.5px solid #b4b2a9;border-radius:8px;padding:10px 14px;color:#111113;font-size:15px;font-weight:500;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;font-family:'Space Mono',monospace}
.field:focus{border-color:#185FA5;box-shadow:0 0 0 3px #e6f1fb}
.time-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:end}
.arrow-div{display:flex;align-items:center;justify-content:center;padding-bottom:10px;color:#b4b2a9;font-size:18px}
.hint{font-size:11px;color:#888780;text-align:center;margin-top:6px}
.err{min-height:20px;font-size:11px;color:#a32d2d;text-align:center;margin:6px 0 0}
.btn-start{width:100%;background:#185FA5;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:13px;letter-spacing:.06em;color:#fff;text-transform:uppercase;cursor:pointer;margin-top:1rem;transition:all .2s;font-family:'Inter',sans-serif}
.btn-start:hover{background:#0c447c;transform:translateY(-1px)}
.btn-start:active{transform:translateY(0)}
.timer-tag{display:inline-block;background:#e6f1fb;border:0.5px solid #85b7eb;border-radius:100px;padding:4px 14px;font-size:11px;font-weight:600;color:#185FA5;margin-bottom:1.25rem;letter-spacing:.05em}
.ring-wrap{display:flex;justify-content:center;margin:0 0 1rem}
.ring-svg{display:block}
.ring-track{fill:none;stroke:#e8e8e8;stroke-width:7}
.ring-prog{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .35s cubic-bezier(.2,.9,.4,1.1)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#f1efe8;border-radius:8px;padding:10px 4px;text-align:center;border:0.5px solid #d3d1c7}
.stat-n{font-size:15px;font-weight:600;color:#111113;font-family:'Space Mono',monospace}
.stat-l{font-size:10px;text-transform:uppercase;color:#888780;letter-spacing:.08em;margin-top:2px}
.prog-bg{background:#e8e8e4;border-radius:20px;height:4px;overflow:hidden;margin-bottom:4px}
.prog-bar{height:100%;background:#185FA5;border-radius:20px;transition:width .35s cubic-bezier(.2,.9,.4,1.1);width:0%}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:#888780;margin-bottom:1rem}
.end-info{text-align:center;font-size:12px;font-family:'Space Mono',monospace;background:#f1efe8;border-radius:8px;padding:8px 12px;margin-bottom:1rem;color:#5f5e5a;border:0.5px solid #d3d1c7}
.end-info strong{color:#185FA5}
.btn-reset{width:100%;background:transparent;border:0.5px solid #d3d1c7;border-radius:8px;padding:10px;font-size:12px;font-weight:500;color:#888780;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;font-family:'Inter',sans-serif}
.btn-reset:hover{background:#f1efe8;border-color:#85b7eb;color:#185FA5}
.done-body{text-align:center;padding:2.5rem 1.5rem}
.done-icon{font-size:3rem;margin-bottom:.75rem}
.done-title{font-size:1.8rem;font-weight:600;color:#111113;margin-bottom:.5rem}
.done-sub{font-size:13px;color:#5f5e5a;margin-bottom:1.5rem}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge"><span class="badge-dot"></span>Chronos</div>
  <div class="main-title">Đếm <em>ngược</em></div>

  <!-- Setup -->
  <div class="card" id="setupCard">
    <div class="card-body">
      <div class="tabs">
        <button class="tab active" id="tabMin">Số phút</button>
        <button class="tab" id="tabRange">Khung giờ</button>
      </div>
      <div id="minsPanel">
        <label class="lbl">Nhập số phút</label>
        <input class="field" type="number" id="minsInput" value="35" min="1" max="9999" placeholder="Ví dụ: 45">
        <div class="hint">Từ 1 đến 9999 phút</div>
      </div>
      <div id="rangePanel" style="display:none">
        <div class="time-row">
          <div>
            <label class="lbl">Bắt đầu</label>
            <input class="field" type="time" id="fromTime" value="14:15">
          </div>
          <div class="arrow-div">→</div>
          <div>
            <label class="lbl">Kết thúc</label>
            <input class="field" type="time" id="toTime" value="17:30">
          </div>
        </div>
        <div class="hint">Tự động tính số phút chênh lệch</div>
      </div>
      <div class="err" id="errMsg"></div>
      <button class="btn-start" id="startBtn">▶ Bắt đầu</button>
    </div>
  </div>

  <!-- Timer -->
  <div class="card" id="timerCard" style="display:none">
    <div class="card-body">
      <div style="text-align:center">
        <span class="timer-tag" id="timerTag">-- phút</span>
      </div>
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 220 220" width="220" height="220">
          <defs>
            <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#185FA5"/>
              <stop offset="100%" stop-color="#534AB7"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="110" cy="110" r="98" transform="rotate(-90 110 110)"/>
          <circle class="ring-prog" id="ringProg" cx="110" cy="110" r="98"
            transform="rotate(-90 110 110)" stroke="url(#rg)"
            stroke-dasharray="615.75" stroke-dashoffset="0"/>
          <text id="rMins" x="110" y="102" text-anchor="middle" font-size="46"
            font-weight="600" fill="#111113" font-family="'Space Mono',monospace">00</text>
          <text id="rUnit" x="110" y="122" text-anchor="middle" font-size="13"
            fill="#888780" font-family="'Inter',sans-serif">phút</text>
          <text id="rSecs" x="110" y="145" text-anchor="middle" font-size="14"
            fill="#185FA5" font-family="'Space Mono',monospace">00 giây</text>
        </svg>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="sPct">0%</div><div class="stat-l">Đã qua</div></div>
        <div class="stat"><div class="stat-n" id="sRem">--</div><div class="stat-l">Còn lại</div></div>
        <div class="stat"><div class="stat-n" id="sTotal">--</div><div class="stat-l">Tổng</div></div>
      </div>
      <div class="prog-bg"><div class="prog-bar" id="progBar"></div></div>
      <div class="prog-meta"><span id="progL">0% đã qua</span><span id="progR">-- giây còn</span></div>
      <div class="end-info">Kết thúc lúc <strong id="endAt">--:--</strong></div>
      <button class="btn-reset" id="resetBtn">↻ Đặt lại</button>
    </div>
  </div>

  <!-- Done -->
  <div class="card" id="doneCard" style="display:none">
    <div class="done-body">
      <div class="done-icon">🏆</div>
      <div class="done-title">Hoàn thành!</div>
      <div class="done-sub" id="doneMsg">Đếm ngược kết thúc thành công</div>
      <button class="btn-start" id="doneResetBtn" style="max-width:220px;margin:0 auto;display:block">Làm lại</button>
    </div>
  </div>
</div>

<script>
(function(){
  const CIRCUM=615.75;
  let mode='mins',iv=null,target=null,total=null;
  const $=id=>document.getElementById(id);
  function fmtDur(ms){const s=Math.ceil(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?h+'h '+(m%60)+'p':m+'p '+(s%60)+'s'}
  function fmtTime(d){return d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
  function showOnly(id){['setupCard','timerCard','doneCard'].forEach(n=>$(n).style.display=n===id?'block':'none')}
  function stopIv(){if(iv){clearInterval(iv);iv=null}}
  function reset(){stopIv();target=null;total=null;showOnly('setupCard');$('errMsg').innerText=''}
  function tick(){
    const now=Date.now(),rem=target-now;
    if(rem<=0){stopIv();$('doneMsg').innerText='Hoàn thành '+Math.round(total/60000)+' phút xuất sắc!';showOnly('doneCard');return}
    const pct=Math.min(1,Math.max(0,(total-rem)/total)),pctInt=Math.round(pct*100);
    const secLeft=Math.ceil(rem/1000),mLeft=Math.floor(secLeft/60),sOnly=secLeft%60;
    $('rMins').textContent=String(mLeft).padStart(2,'0');
    $('rSecs').textContent=String(sOnly).padStart(2,'0')+' giây';
    $('ringProg').style.strokeDashoffset=String(CIRCUM*pct);
    $('sPct').textContent=pctInt+'%';
    $('sRem').textContent=fmtDur(rem);
    $('progBar').style.width=pctInt+'%';
    $('progL').textContent=pctInt+'% đã qua';
    $('progR').textContent=secLeft+' giây còn';
  }
  function launch(durMs,label,endDate){
    if(durMs<=0){$('errMsg').innerText='Thời gian không hợp lệ';return}
    stopIv();total=durMs;target=Date.now()+durMs;
    $('timerTag').textContent=label;
    $('sTotal').textContent=fmtDur(durMs);
    $('endAt').textContent=fmtTime(endDate);
    showOnly('timerCard');tick();
    iv=setInterval(tick,250);
  }
  function onStart(){
    $('errMsg').innerText='';
    if(mode==='mins'){
      const m=parseInt($('minsInput').value);
      if(isNaN(m)||m<1){$('errMsg').innerText='Nhập số phút hợp lệ (≥1)';return}
      if(m>9999){$('errMsg').innerText='Tối đa 9999 phút';return}
      launch(m*60000,m+' phút',new Date(Date.now()+m*60000));
    } else {
      const fv=$('fromTime').value,tv=$('toTime').value;
      if(!fv||!tv){$('errMsg').innerText='Chọn đầy đủ thời gian';return}
      const[fh,fm]=fv.split(':').map(Number),[th,tm]=tv.split(':').map(Number);
      let a=fh*60+fm,b=th*60+tm;if(b<=a)b+=1440;
      const diff=b-a;
      if(diff<=0||diff>2880){$('errMsg').innerText='Khoảng thời gian không hợp lệ';return}
      launch(diff*60000,fv+' → '+tv+' ('+diff+'p)',new Date(Date.now()+diff*60000));
    }
  }
  function setMode(m){
    mode=m;
    $('minsPanel').style.display=m==='mins'?'block':'none';
    $('rangePanel').style.display=m==='range'?'block':'none';
    $('tabMin').classList.toggle('active',m==='mins');
    $('tabRange').classList.toggle('active',m==='range');
    $('errMsg').innerText='';
  }
  $('tabMin').onclick=()=>setMode('mins');
  $('tabRange').onclick=()=>setMode('range');
  $('startBtn').onclick=onStart;
  $('resetBtn').onclick=reset;
  $('doneResetBtn').onclick=reset;
})();
</script>
</body>
</html>
